<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .htp-fab {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--ink);
            color: var(--gold);
            border: 3px solid var(--gold);
            border-radius: 50px;
            padding: 0.45rem 0.9rem 0.45rem 0.6rem;
            font-family: var(--font-display);
            font-size: 1rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            text-decoration: none;
            transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
        }

            .htp-fab:hover {
                background: var(--gold);
                color: var(--ink);
                transform: translate(-1px,-1px);
                box-shadow: 5px 5px 0 rgba(0,0,0,0.4);
            }

            .htp-fab:active {
                transform: translate(1px,1px);
                box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            }

        .htp-fab-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-family: var(--font-display);
            flex-shrink: 0;
            transition: background 0.12s, color 0.12s;
        }

        .htp-fab:hover .htp-fab-icon {
            background: var(--ink);
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="page" style="position:relative;">
        <div class="halftone-bg"></div>

        <!-- How to Play button -->
        <a href="/how-to-play" class="htp-fab">
            <span class="htp-fab-icon">?</span>
            HOW TO PLAY
        </a>

        <div class="landing-layout">
            <div class="logo-lockup">
                <svg class="site-logo" viewBox="0 0 340 160" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="170,6 320,52 320,118 170,154 20,118 20,52" fill="#0d0d1a" stroke="#FFD93D" stroke-width="4" />
                    <polygon points="170,18 308,60 308,112 170,142 32,112 32,60" fill="none" stroke="#FF6B6B" stroke-width="1.5" />
                    <text x="170" y="90" text-anchor="middle" font-family="Bangers,Impact,sans-serif" font-size="68" fill="#FFD93D" letter-spacing="2">UC</text>
                    <rect x="80" y="100" width="180" height="26" rx="4" fill="#FF6B6B" />
                    <text x="170" y="119" text-anchor="middle" font-family="Bangers,Impact,sans-serif" font-size="14" fill="white" letter-spacing="3">UNIVERSITY CHALLENGE</text>
                    <circle cx="100" cy="44" r="4" fill="#6BCF7F" opacity="0.8" />
                    <circle cx="170" cy="28" r="4" fill="#FF6B6B" opacity="0.8" />
                    <circle cx="240" cy="44" r="4" fill="#FFD93D" opacity="0.8" />
                </svg>
                <p class="landing-tagline">TEST YOUR BRAIN POWER</p>
            </div>
            <div class="landing-cards">
                <a href="/teacher" class="role-card role-teacher">
                    <span class="role-icon">🎓</span>
                    <span class="role-title">Teacher</span>
                    <span class="role-sub">Host a game</span>
                </a>
                <a href="/join" class="role-card role-student">
                    <span class="role-icon">⚡</span>
                    <span class="role-title">Student</span>
                    <span class="role-sub">Join a game</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
