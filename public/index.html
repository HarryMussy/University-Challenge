<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMinds Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .htp-fab {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--ink);
            color: var(--gold);
            border: 3px solid var(--gold);
            border-radius: 50px;
            padding: 0.45rem 0.9rem 0.45rem 0.6rem;
            font-family: var(--font-display);
            font-size: 1rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            text-decoration: none;
            transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
        }

            .htp-fab:hover {
                background: var(--gold);
                color: var(--ink);
                transform: translate(-1px,-1px);
                box-shadow: 5px 5px 0 rgba(0,0,0,0.4);
            }

            .htp-fab:active {
                transform: translate(1px,1px);
                box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            }

        .htp-fab-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-family: var(--font-display);
            flex-shrink: 0;
            transition: background 0.12s, color 0.12s;
        }

        .htp-fab:hover .htp-fab-icon {
            background: var(--ink);
            color: var(--gold);
        }
    </style>
</head>
<body>
<div class="page" style="position:relative;">
  <div class="halftone-bg"></div>

  <!-- How to Play button -->
  <a href="/how-to-play" class="htp-fab">

    HOW TO PLAY
  </a>

        <div class="landing-layout">

  <rect x="4" y="4" width="388" height="148" rx="14" fill="#0d0d1a"/>
  <rect x="0" y="0" width="392" height="152" rx="14" fill="#1a1a2e" stroke="#FFD93D" stroke-width="4"/>
  <rect x="12" y="12" width="368" height="128" rx="8" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="5,4"/>

  <text x="194" y="76" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="62" font-weight="900" fill="#FFD93D" letter-spacing="2">UNIMINDS</text>
  <rect x="56" y="90" width="280" height="38" rx="5" fill="#FF6B6B" stroke="#0d0d1a" stroke-width="2.5"/>
  <text x="196" y="116" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="8">ARENA</text>
  <circle cx="34" cy="20" r="5" fill="#6BCF7F" stroke="#0d0d1a" stroke-width="1.5"/>

</svg>
                <p class="landing-tagline">TEST YOUR BRAIN POWER</p>
            </div>
