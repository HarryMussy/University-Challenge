<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play — University Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
</head>
<body style="background:#1a1a2e;">

<div class="student-view">
  <div class="student-header">
    <div class="stu-info">
      <span id="teamNameDisplay" class="stu-team"></span>
      <span class="stu-score-label">Score: <strong id="scoreDisplay">0</strong></span>
    </div>
    <span id="questionNumber" class="q-num-badge">Q1</span>
  </div>
  <div class="student-question-area">
    <p id="questionText" class="student-question-text" style="color:rgba(255,255,255,0.4);font-style:italic;">
      Waiting for question…
    </p>
  </div>
  <div class="student-buzz-area">
    <button id="buzzButton" class="buzz-btn" disabled>BUZZ IN!</button>
    <div id="buzzedIndicator" class="buzzed-indicator hidden">🔔 You buzzed in!</div>
    <div id="resultMessage" class="result-message hidden"></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="shared.js"></script>
<script>
(function() {
  const game = Session.getGame();
  if (!game) { window.location.href = '/join'; return; }

  const { room, name, myTeamId, gameMode, teams, scores: initialScores } = game;
  let scores = { ...initialScores };
  let myBuzzed = false;
  let currentQIndex = 0;

  // Set team display
  const myTeam = teams && teams.find(t => t.id === myTeamId);
  $('teamNameDisplay').textContent = myTeam ? myTeam.name : name;
  if (myTeam) $('teamNameDisplay').style.color = myTeam.colour;
  updateScore();

  const socket = io();

  socket.on('connect', () => {
    console.log('[STUDENT GAME] socket connected:', socket.id);
    // Re-join room to receive game events
    socket.emit('student-join', { room, name, teamId: myTeamId });
  });

  socket.on('question-revealed', data => {
    // Gradual reveal
    const text = data.text;
    let i = 0;
    const interval = setInterval(() => {
      $('questionText').textContent = text.slice(0, i + 1);
      $('questionText').style.color = 'white';
      $('questionText').style.fontStyle = 'normal';
      i++;
      if (i >= text.length) clearInterval(interval);
    }, 50); // 50ms per character
    $('questionNumber').textContent = `Q${data.index + 1}`;
    currentQIndex = data.index;
    // Re-enable buzz
    $('buzzButton').disabled = false;
    $('buzzedIndicator').classList.add('hidden');
    $('resultMessage').classList.add('hidden');
    myBuzzed = false;
  });

  socket.on('buzzed', data => {
    // Disable buzz for everyone once someone buzzes
    $('buzzButton').disabled = true;
    if (data.name === name) {
      $('buzzedIndicator').classList.remove('hidden');
    }
  });

  socket.on('buzz-reset', () => {
    $('buzzButton').disabled = false;
    $('buzzedIndicator').classList.add('hidden');
    $('resultMessage').classList.add('hidden');
    myBuzzed = false;
    // Question text resets via question-revealed
    $('questionText').textContent = 'Waiting for question…';
    $('questionText').style.color = 'rgba(255,255,255,0.4)';
    $('questionText').style.fontStyle = 'italic';
  });

  socket.on('answer-result', data => {
    const el = $('resultMessage');
    el.classList.remove('hidden', 'correct', 'incorrect');
    el.textContent = data.correct ? `✓ Correct! +${data.points} pts` : `✗ Incorrect! ${data.points} pts`;
    el.classList.add(data.correct ? 'correct' : 'incorrect');
    $('buzzButton').disabled = false;
    $('buzzedIndicator').classList.add('hidden');
  });

  socket.on('score-update', data => {
    scores = data.scores;
    updateScore();
  });

  socket.on('game-ended', data => {
    scores = data.scores;
    Session.saveGame({ ...game, scores });
    window.location.href = '/results';
  });

  socket.on('host-disconnected', () => {
    alert('The host has disconnected.');
    window.location.href = '/';
  });

  socket.on('kicked', () => {
    alert('You have been kicked from the room.');
    Session.clearStudent();
    Session.clearGame();
    window.location.href = '/join';
  });

  $('buzzButton').onclick = () => {
    if (myBuzzed) return;
    myBuzzed = true;
    $('buzzButton').disabled = true;
    socket.emit('buzz', { room, name, teamId: myTeamId });
  };

  function updateScore() {
    const key = myTeamId || name;
    $('scoreDisplay').textContent = scores[key] ?? 0;
  }
})();
</script>
</body>
</html>
