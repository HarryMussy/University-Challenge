<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — UniMinds Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page page-dark" style="align-items:center;justify-content:center;">
  <div class="results-wrap">
    <div class="results-header">
      <svg class="results-logo" viewBox="0 0 392 152" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="388" height="148" rx="14" fill="#0d0d1a"/>
        <rect x="0" y="0" width="392" height="152" rx="14" fill="#1a1a2e" stroke="#FFD93D" stroke-width="4"/>
        <rect x="12" y="12" width="368" height="128" rx="8" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="5,4"/>
        <text x="196" y="80" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="62" font-weight="900" fill="#0d0d1a" opacity="0.6" letter-spacing="2">UNIMINDS</text>
        <text x="194" y="76" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="62" font-weight="900" fill="#FFD93D" letter-spacing="2">UNIMINDS</text>
        <rect x="56" y="90" width="280" height="38" rx="5" fill="#FF6B6B" stroke="#0d0d1a" stroke-width="2.5"/>
        <text x="196" y="116" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="8">ARENA</text>
        <circle cx="34" cy="20" r="5" fill="#6BCF7F" stroke="#0d0d1a" stroke-width="1.5"/>
        <circle cx="196" cy="10" r="5" fill="#FF6B6B" stroke="#0d0d1a" stroke-width="1.5"/>
        <circle cx="358" cy="20" r="5" fill="#FFD93D" stroke="#0d0d1a" stroke-width="1.5"/>
      </svg>
      <h1 class="results-title">Final Scores!</h1>
    </div>
    <div id="resultsList" class="results-podium"></div>
    <div class="btn-row">
      <a href="/" class="btn btn-outline">🏠 Home</a>
      <a id="playAgainBtn" href="/teacher-lobby" class="btn btn-primary btn-lg">Play Again</a>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
(function() {
  // Try game session first, then room session
  const game = Session.getGame() || Session.getRoom();
  const teacher = Session.getTeacher();

  // Set play again link
  if (!teacher) {
    $('playAgainBtn').href = '/';
    $('playAgainBtn').textContent = '🏠 Back to Home';
  }

  if (!game) {
    $('resultsList').innerHTML = '<p style="color:rgba(255,255,255,0.5);text-align:center;font-weight:600;">No results to show.</p>';
    return;
  }

  const { teams, scores, gameMode } = game;
  const medals = ['🥇','🥈','🥉'];

  const entries = Object.entries(scores || {})
    .map(([id, pts]) => {
      const team = teams && teams.find(t => t.id === id);
      return { name: team ? team.name : id, pts, colour: team?.colour };
    })
    .sort((a,b) => b.pts - a.pts);

  const el = $('resultsList');
  if (!entries.length) {
    el.innerHTML = '<p style="color:rgba(255,255,255,0.5);text-align:center;font-weight:600;">No scores recorded.</p>';
    return;
  }

  entries.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'result-card' + (i === 0 ? ' winner' : '');
    card.innerHTML = `
      <span class="result-rank">${medals[i] || `#${i+1}`}</span>
      <span class="result-name" style="border-left:4px solid ${e.colour||'#FFD93D'};padding-left:0.75rem;">${e.name}</span>
      <span class="result-score">${e.pts} pts</span>
    `;
    el.appendChild(card);
  });

  // Clean up transient sessions. Keep room data for teachers so
  // Play Again can restore the same room code in teacher-lobby.
  Session.clearGame();
  Session.clearStudent();
  if (!teacher) Session.clearRoom();
})();
</script>
</body>
</html>
