<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game — University Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:#1a1a2e;">

<!-- Audio elements -->
<audio id="buzzSound" src="sounds/buzz.mp3" preload="auto"></audio>
<audio id="correctSound" src="sounds/correct.mp3" preload="auto"></audio>
<audio id="incorrectSound" src="sounds/incorrect.mp3" preload="auto"></audio>
<audio id="tenseMusic" src="sounds/tense.mp3" loop preload="auto"></audio>

<div class="host-view">
  <!-- Sidebar -->
  <div class="host-sidebar">
    <div class="host-q-meta">
      <span id="questionNumber" class="q-num-badge">Q1</span>
      <span id="totalQuestions" style="color:rgba(255,255,255,0.4);font-size:0.85rem;font-weight:600;"></span>
    </div>
    <div>
      <h3 class="sb-title">Scoreboard</h3>
      <div id="scoresList" class="scores-list"></div>
    </div>
    <div id="buzzStatusBox" class="host-buzz-status">
      <span class="buzz-waiting">Waiting for buzz…</span>
    </div>
  </div>

  <!-- Main -->
  <div class="host-main">
    <p id="questionText" class="host-question-text" style="color:rgba(255,255,255,0.3);font-style:italic;">
      Press "Reveal Question" to show the question
    </p>
    <div id="answerReveal" class="host-answer-reveal hidden">
      <span class="ar-label">Correct Answer</span>
      <span id="correctAnswerDisplay" class="ar-answer"></span>
    </div>
    <div class="host-controls">
      <button id="revealQuestionBtn" class="btn btn-gold">📝 Reveal Question</button>
      <button id="correctBtn"        class="btn btn-success">✓ Correct</button>
      <button id="incorrectBtn"      class="btn btn-danger">✗ Incorrect</button>
      <button id="nextQuestionBtn"   class="btn btn-primary">Next →</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="shared.js"></script>
<script>
(function() {
  const roomData = Session.getRoom();
  if (!roomData) { window.location.href = '/teacher-lobby'; return; }

  const { room, teams, gameMode, questions } = roomData;
  let scores = roomData.scores || {};
  let currentQ = 0;
  let questionRevealed = false;
  let answerRevealed = false;
  let buzzedBy = null;
  let buzzedTeamId = null;

  $('totalQuestions').textContent = `/ ${questions.length}`;

  // Connect socket as host (re-create for game events)
  const socket = io();

  socket.on('connect', () => {
    console.log('[TEACHER GAME] socket connected:', socket.id);
    socket.emit('host-create', { room, teams, gameMode, questions });
  });

  socket.on('host-room-created', () => {
    // Room re-created
  });

  socket.on('buzzed', data => {
    if (buzzedBy) return; // ignore subsequent buzzes
    buzzedBy = data.name;
    buzzedTeamId = data.teamId;
    const team = teams.find(t => t.id === data.teamId);
    const teamLabel = team ? ` (${team.name})` : '';
    $('buzzStatusBox').innerHTML = `<span class="buzz-alert">🔔 ${data.name}${teamLabel} buzzed in!</span>`;
    $('buzzSound').play();
    $('tenseMusic').pause();
  });

  socket.on('score-update', data => {
    scores = data.scores;
    renderScores();
  });

  // ── Display question ──
  function displayQuestion() {
    if (currentQ >= questions.length) { endGame(); return; }
    const q = questions[currentQ];
    $('questionNumber').textContent = `Q${currentQ + 1}`;
    $('questionText').textContent = 'Press "Reveal Question" to show the question';
    $('questionText').style.color = 'rgba(255,255,255,0.3)';
    $('questionText').style.fontStyle = 'italic';
    $('answerReveal').classList.add('hidden');
    $('correctAnswerDisplay').textContent = '';
    $('buzzStatusBox').innerHTML = '<span class="buzz-waiting">Waiting for buzz…</span>';
    questionRevealed = false;
    answerRevealed = false;
    buzzedBy = null;
    buzzedTeamId = null;
    $('revealQuestionBtn').disabled = false;
    renderScores();
  }

  $('revealQuestionBtn').onclick = () => {
    if (questionRevealed) return;
    const q = questions[currentQ];
    questionRevealed = true;
    $('revealQuestionBtn').disabled = true;
    socket.emit('host-reveal-question', { room });
    $('tenseMusic').play();
    // Gradual reveal
    const text = q.text;
    let i = 0;
    const interval = setInterval(() => {
      $('questionText').textContent = text.slice(0, i + 1);
      $('questionText').style.color = 'white';
      $('questionText').style.fontStyle = 'normal';
      i++;
      if (i >= text.length) clearInterval(interval);
    }, 50); // 50ms per character
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
  };

  $('correctBtn').onclick   = () => markAnswer(true);
  $('incorrectBtn').onclick = () => markAnswer(false);

  function markAnswer(correct) {
    const q = questions[currentQ];
    const pts = correct ? q.points : -1;
    if (gameMode === 'teams' && buzzedTeamId) {
      scores[buzzedTeamId] = (scores[buzzedTeamId] || 0) + pts;
    } else if (buzzedBy) {
      scores[buzzedBy] = (scores[buzzedBy] || 0) + pts;
    }
    socket.emit('host-mark', { room, correct, buzzedName: buzzedBy, buzzedTeamId });
    
    // Auto-reveal answer only if correct
    if (correct && !answerRevealed) {
      const text = q.answer;
      let i = 0;
      const interval = setInterval(() => {
        $('correctAnswerDisplay').textContent = text.slice(0, i + 1);
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 50);
      $('answerReveal').classList.remove('hidden');
      answerRevealed = true;
      speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    }
    
    buzzedBy = null; buzzedTeamId = null;
    $('buzzStatusBox').innerHTML = '<span class="buzz-waiting">Waiting for buzz…</span>';
    renderScores();
    if (correct) {
      $('correctSound').play();
    } else {
      $('incorrectSound').play();
    }
  }

  $('nextQuestionBtn').onclick = () => {
    currentQ++;
    socket.emit('host-next-question', { room });
    displayQuestion();
    $('tenseMusic').pause();
    $('tenseMusic').currentTime = 0;
  };

  function renderScores() {
    const el = $('scoresList'); el.innerHTML = '';
    const entries = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const top = entries[0]?.[1];
    entries.forEach(([id, pts]) => {
      const team = teams.find(t => t.id === id);
      const name = team ? team.name : id;
      const colour = team ? team.colour : '#FFD93D';
      const row = document.createElement('div');
      row.className = 'score-row' + (pts === top && pts > 0 ? ' leading' : '');
      row.innerHTML = `
        <span style="display:flex;align-items:center;gap:0.5rem;">
          <span style="width:10px;height:10px;border-radius:50%;background:${colour};display:inline-block;border:1.5px solid #fff;"></span>
          ${name}
        </span>
        <span class="score-pts">${pts}</span>`;
      el.appendChild(row);
    });
  }

  function endGame() {
    Session.saveGame({ teams, scores, gameMode, room, questions });
    socket.emit('host-next-question', { room }); // triggers game-ended on server
    $('tenseMusic').pause();
    $('tenseMusic').currentTime = 0;
    
    // Play victory sound immediately
    const victorySound = new Audio('data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==');
    try { victorySound.play().catch(() => {}); } catch(e) {}
    
    // Show end game screen with scoreboard
    const hostView = document.querySelector('.host-view');
    hostView.style.display = 'none';
    const endOverlay = document.createElement('div');
    endOverlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:1000;overflow-y:auto;padding:2rem;';
    
    // Render scoreboard
    const entries = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const scoreboard = entries.map(([ key, pts ]) => {
      const team = teams.find(t => t.id === key);
      const name = team ? team.name : key;
      const colour = team ? team.colour : '#FFD93D';
      return `<div style="display:flex;align-items:center;gap:1rem;margin:0.5rem;font-size:1.1rem;">
        <span style="width:16px;height:16px;border-radius:50%;background:${colour};border:2px solid white;"></span>
        <span>${name}</span>
        <span style="margin-left:auto;font-weight:800;font-size:1.4rem;color:#FFD93D;">${pts}</span>
      </div>`;
    }).join('');
    
    endOverlay.innerHTML = `
      <h1 style="font-family:Bangers,Impact,sans-serif;font-size:3.5rem;margin-bottom:0.5rem;color:#FFD93D;">🏆 Game Over! 🏆</h1>
      <div style="background:rgba(255,217,61,0.1);border:3px solid #FFD93D;border-radius:16px;padding:1.5rem;margin-bottom:2rem;max-width:500px;text-align:center;">
        ${scoreboard}
      </div>
      <div style="display:flex;gap:1rem;">
        <button id="playAgainBtn" style="padding:0.75rem 1.75rem;border:3px solid white;border-radius:10px;background:#FFD93D;color:#0d0d1a;font-weight:800;font-size:1.1rem;cursor:pointer;">Play Again</button>
        <button id="viewResultsBtn" style="padding:0.75rem 1.75rem;border:3px solid #FFD93D;border-radius:10px;background:transparent;color:#FFD93D;font-weight:800;font-size:1.1rem;cursor:pointer;">View Results</button>
      </div>
    `;
    document.body.appendChild(endOverlay);
    
    $('playAgainBtn').onclick = () => {
      endOverlay.remove();
      hostView.style.display = '';
      // Reset for new game with same questions
      currentQ = 0;
      if (gameMode === 'teams') {
        teams.forEach(t => scores[t.id] = 0);
      } else {
        Object.keys(scores).forEach(k => scores[k] = 0);
      }
      console.log('[TEACHER] Requesting game reset');
      socket.emit('host-reset-game', { room, questions });
      displayQuestion();
    };
    
    $('viewResultsBtn').onclick = () => {
      window.location.href = '/results';
    };\n  }

  // Start
  displayQuestion();
})();
</script>
</body>
</html>
