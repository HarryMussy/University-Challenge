<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login — University Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PANEL -->
<div id="loginPage" class="page page-dark">
  <div class="panel">
    <div class="panel-header">
      <svg class="panel-logo" viewBox="0 0 340 160" xmlns="http://www.w3.org/2000/svg">
        <polygon points="170,6 320,52 320,118 170,154 20,118 20,52" fill="#0d0d1a" stroke="#FFD93D" stroke-width="4"/>
        <text x="170" y="90" text-anchor="middle" font-family="Bangers,Impact,sans-serif" font-size="68" fill="#FFD93D" letter-spacing="2">UC</text>
        <rect x="80" y="100" width="180" height="26" rx="4" fill="#FF6B6B"/>
        <text x="170" y="119" text-anchor="middle" font-family="Bangers,Impact,sans-serif" font-size="14" fill="white" letter-spacing="3">UNIVERSITY CHALLENGE</text>
      </svg>
      <h1>Teacher Login</h1>
    </div>

    <div id="emailStep">
      <p class="step-hint">Enter your staff email to receive a verification code.</p>
      <div class="field-group">
        <label class="field-label">Staff Email</label>
        <input type="email" id="teacherEmail" class="field-input" placeholder="you@staff.ac.uk" autocomplete="email">
      </div>
      <div id="loginStatus" class="status-msg hidden"></div>
      <div class="btn-col">
        <button id="sendOtpBtn" class="btn btn-primary btn-full">Send Verification Code</button>
        <a href="/" class="btn btn-ghost btn-full">← Back to Home</a>
      </div>
    </div>

    <div id="otpStep" class="hidden">
      <p class="step-hint">Code sent to <strong id="otpEmailDisplay"></strong></p>
      <div class="otp-row">
        <input type="text" class="otp-digit" inputmode="numeric" maxlength="1" autocomplete="one-time-code">
        <input type="text" class="otp-digit" inputmode="numeric" maxlength="1">
        <input type="text" class="otp-digit" inputmode="numeric" maxlength="1">
        <span class="otp-sep">—</span>
        <input type="text" class="otp-digit" inputmode="numeric" maxlength="1">
        <input type="text" class="otp-digit" inputmode="numeric" maxlength="1">
        <input type="text" class="otp-digit" inputmode="numeric" maxlength="1">
      </div>
      <div id="otpTimer" class="otp-timer"></div>
      <div id="otpStatus" class="status-msg hidden"></div>
      <div class="btn-col">
        <button id="verifyOtpBtn" class="btn btn-primary btn-full" disabled>Verify & Enter</button>
        <div class="btn-row">
          <button id="resendOtpBtn" class="btn btn-ghost btn-sm">Resend Code</button>
          <button id="changeEmailBtn" class="btn btn-ghost btn-sm">Change Email</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
/* ── Teacher Login Page ─────────────────────── */
(function() {
  // Redirect if already logged in
  if (Session.getTeacher()) { window.location.href = '/teacher-lobby'; return; }

  let pendingEmail = null, generatedOtp = null, otpExpiry = null, otpAttempts = 0;
  const MAX_ATTEMPTS = 3, OTP_VALID_MS = 10 * 60 * 1000;
  let timerInterval = null;

  // Init EmailJS
  if (typeof emailjs !== 'undefined' && EMAILJS_CONFIG.publicKey !== 'YOUR_PUBLIC_KEY') {
    emailjs.init(EMAILJS_CONFIG.publicKey);
  }

  // DOM ready
  $('sendOtpBtn').onclick   = sendOtp;
  $('verifyOtpBtn').onclick = verifyOtp;
  $('resendOtpBtn').onclick = resendOtp;
  $('changeEmailBtn').onclick = showEmailStep;
  $('teacherEmail').onkeydown = e => { if (e.key === 'Enter') sendOtp(); };

  // OTP digits
  const digits = $$('.otp-digit');
  digits.forEach((inp, i) => {
    inp.oninput = e => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(-1);
      if (e.target.value && i < digits.length - 1) digits[i+1].focus();
      refreshVerify();
    };
    inp.onkeydown = e => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i-1].focus();
      if (e.key === 'Enter') verifyOtp();
    };
    inp.onpaste = e => {
      e.preventDefault();
      const txt = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      digits.forEach((d,j) => d.value = txt[j]||'');
      digits[Math.min(txt.length,digits.length)-1].focus();
      refreshVerify();
    };
  });

  function showEmailStep() {
    $('emailStep').classList.remove('hidden');
    $('otpStep').classList.add('hidden');
    clearStatus('loginStatus');
  }

  function emailAllowed(email) {
    const domain = email.split('@')[1]?.toLowerCase();
    return ALLOWED_DOMAINS.some(d => domain === d);
  }

  async function sendOtp() {
    const email = $('teacherEmail').value.trim().toLowerCase();
    if (!email.includes('@')) { setStatus('loginStatus','Enter a valid email address.','error'); return; }
    if (!emailAllowed(email))  { setStatus('loginStatus','Only authorised staff email addresses are permitted.','error'); return; }

    pendingEmail  = email;
    generatedOtp  = makeOtp();
    otpExpiry     = Date.now() + OTP_VALID_MS;
    otpAttempts   = 0;

    const btn = $('sendOtpBtn');
    btn.disabled = true; btn.textContent = 'Sending…';
    clearStatus('loginStatus');

    try {
      await dispatchEmail(email, generatedOtp);
      $('emailStep').classList.add('hidden');
      $('otpStep').classList.remove('hidden');
      $('otpEmailDisplay').textContent = email;
      digits.forEach(d => d.value = '');
      digits[0].focus();
      refreshVerify();
      startTimer();
    } catch(e) {
      console.error(e);
      setStatus('loginStatus','Failed to send email. Check console for details.','error');
    } finally {
      btn.disabled = false; btn.textContent = 'Send Verification Code';
    }
  }

  async function resendOtp() {
    generatedOtp = makeOtp(); otpExpiry = Date.now() + OTP_VALID_MS; otpAttempts = 0;
    const btn = $('resendOtpBtn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      await dispatchEmail(pendingEmail, generatedOtp);
      digits.forEach(d => d.value = ''); digits[0].focus();
      setStatus('otpStatus','New code sent!','success'); startTimer();
    } catch { setStatus('otpStatus','Failed to resend. Try again.','error'); }
    finally { btn.disabled = false; btn.textContent = 'Resend Code'; }
  }

  async function dispatchEmail(email, otp) {
    if (typeof emailjs === 'undefined' || EMAILJS_CONFIG.publicKey === 'YOUR_PUBLIC_KEY') {
      console.log(`%c[DEV] OTP for ${email}: ${otp}`, 'background:#0d0d1a;color:#FFD93D;padding:4px 10px;border-radius:4px;font-size:15px;');
      setStatus('loginStatus', `[Dev mode] Code logged to console (F12)`, 'info');
      return;
    }
    await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
      to_email: email, otp_code: otp, name: email.split('@')[0]
    });
  }

  function verifyOtp() {
    const entered = Array.from(digits).map(d => d.value).join('');
    if (entered.length < 6) { setStatus('otpStatus','Enter all 6 digits.','error'); return; }
    if (Date.now() > otpExpiry) { setStatus('otpStatus','Code has expired. Request a new one.','error'); return; }
    otpAttempts++;
    if (entered === generatedOtp) {
      Session.saveTeacher(pendingEmail);
      window.location.href = '/teacher-lobby';
    } else {
      const left = MAX_ATTEMPTS - otpAttempts;
      if (left <= 0) {
        digits.forEach(d => { d.value=''; d.disabled=true; });
        $('verifyOtpBtn').disabled = true;
        setStatus('otpStatus','Too many wrong attempts. Request a new code.','error');
      } else {
        setStatus('otpStatus',`Incorrect. ${left} attempt${left>1?'s':''} remaining.`,'error');
        digits.forEach(d => d.value=''); digits[0].focus();
      }
    }
  }

  function refreshVerify() {
    $('verifyOtpBtn').disabled = !Array.from(digits).every(d => d.value.length === 1);
  }

  function startTimer() {
    clearInterval(timerInterval);
    const el = $('otpTimer'), end = otpExpiry;
    const tick = () => {
      const rem = Math.max(0, end - Date.now());
      const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
      el.textContent = rem > 0 ? `Expires in ${m}:${s.toString().padStart(2,'0')}` : 'Code expired';
      el.style.color = rem < 60000 ? '#e74c3c' : '';
      if (!rem) clearInterval(timerInterval);
    };
    tick(); timerInterval = setInterval(tick, 1000);
  }
})();
</script>
</body>
</html>
