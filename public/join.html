<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join — UniMinds Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
</head>
<body>
<div class="page page-dark">
  <div class="panel">
    <div class="panel-header">
      <svg class="site-logo" viewBox="0 0 392 152" xmlns="http://www.w3.org/2000/svg">
  <rect x="4" y="4" width="388" height="148" rx="14" fill="#0d0d1a"/>
  <rect x="0" y="0" width="392" height="152" rx="14" fill="#1a1a2e" stroke="#FFD93D" stroke-width="4"/>
  <rect x="12" y="12" width="368" height="128" rx="8" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="196" y="80" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="62" font-weight="900" fill="#0d0d1a" opacity="0.6" letter-spacing="2">UNIMINDS</text>
  <text x="194" y="76" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="62" font-weight="900" fill="#FFD93D" letter-spacing="2">UNIMINDS</text>
  <rect x="56" y="90" width="280" height="38" rx="5" fill="#FF6B6B" stroke="#0d0d1a" stroke-width="2.5"/>
  <text x="196" y="116" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="8">ARENA</text>
  <circle cx="34" cy="20" r="5" fill="#6BCF7F" stroke="#0d0d1a" stroke-width="1.5"/>
  <circle cx="196" cy="10" r="5" fill="#FF6B6B" stroke="#0d0d1a" stroke-width="1.5"/>
  <circle cx="358" cy="20" r="5" fill="#FFD93D" stroke="#0d0d1a" stroke-width="1.5"/>
</svg>
      <h1>Join the Challenge</h1>
    </div>

    <div class="field-group">
      <label class="field-label">Room Code</label>
      <input type="text" id="roomCodeInput" class="field-input field-code" placeholder="ABCDEF"
             maxlength="6" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')">
    </div>
    <div class="field-group">
      <label class="field-label">Your Name</label>
      <input type="text" id="studentName" class="field-input" placeholder="Enter your name" maxlength="30">
    </div>
    <div id="joinStatus" class="status-msg hidden"></div>
    <div class="btn-col">
      <button id="joinBtn" class="btn btn-primary btn-full">Join Game</button>
      <a href="/" class="btn btn-ghost btn-full">← Back to Home</a>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="shared.js"></script>
<script>
(function() {
  const joinBtn = $('joinBtn');

  // Allow Enter key on either field
  $('roomCodeInput').onkeydown = e => { if (e.key === 'Enter') $('studentName').focus(); };
  $('studentName').onkeydown   = e => { if (e.key === 'Enter') attemptJoin(); };
  joinBtn.onclick = attemptJoin;

  function attemptJoin() {
    const code = $('roomCodeInput').value.trim().toUpperCase();
    const name = $('studentName').value.trim();

    if (!/^[A-Z]{6}$/.test(code)) {
      setStatus('joinStatus', 'Enter a valid 6-letter room code.', 'error'); return;
    }
    if (!name) {
      setStatus('joinStatus', 'Enter your name.', 'error'); return;
    }

    joinBtn.disabled = true;
    joinBtn.textContent = 'Joining…';
    clearStatus('joinStatus');

    const socket = io();

    socket.on('connect', () => {
      console.log('[STUDENT] connected, socket:', socket.id);
      socket.emit('student-join', { room: code, name });
    });

    socket.on('room-info', data => {
      // Save student info for next pages
      Session.saveStudent({ name, room: code, gameMode: data.gameMode, teams: data.teams });

      if (data.gameMode === 'teams' && data.teams && data.teams.length > 0) {
        window.location.href = '/student-lobby';
      } else {
        // Solo mode — go straight to waiting
        window.location.href = '/student-lobby';
      }
    });

    socket.on('join-error', data => {
      joinBtn.disabled = false;
      joinBtn.textContent = 'Join Game';
      setStatus('joinStatus', data.message || 'Could not join room.', 'error');
      socket.disconnect();
    });

    socket.on('connect_error', () => {
      joinBtn.disabled = false;
      joinBtn.textContent = 'Join Game';
      setStatus('joinStatus', 'Connection failed. Please try again.', 'error');
    });

    // Timeout if no response
    setTimeout(() => {
      if (joinBtn.disabled) {
        joinBtn.disabled = false;
        joinBtn.textContent = 'Join Game';
        setStatus('joinStatus', 'Room not found or server timed out.', 'error');
        socket.disconnect();
      }
    }, 6000);
  }
})();
</script>
</body>
</html>
